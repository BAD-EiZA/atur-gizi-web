<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Ilustrasi piring makanan</title>
  <desc id="desc">Piring dengan nasi, ayam, dan sayur sebagai contoh foto makanan</desc>
